<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spanish Words Pro</title>

<style>
body{font-family:Arial,Helvetica,sans-serif;background:linear-gradient(135deg,#0fb9b1,#48dbfb);margin:0;color:#0f172a}
header{padding:16px;text-align:center;font-size:22px;font-weight:bold;color:white}
.container{max-width:950px;margin:auto;padding:16px}
.card{background:white;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 10px 25px rgba(0,0,0,0.1)}
button{padding:10px 14px;border:none;border-radius:10px;background:#0fb9b1;color:white;font-size:14px;margin:4px;cursor:pointer}
button.green{background:#10ac84}
button.orange{background:#ff9f43}
input{padding:10px;border-radius:8px;border:1px solid #ccc;width:100%;margin:6px 0}
.word{font-size:28px;font-weight:bold;margin-bottom:8px}
.translation{font-size:22px;margin:10px 0}
.small{font-size:13px;color:#555}
.hidden{display:none}
.nav{display:flex;flex-wrap:wrap;justify-content:center;margin-bottom:15px}
.progress{height:8px;background:#e5e7eb;border-radius:6px;margin:10px 0}
.progressbar{height:8px;background:#10ac84;border-radius:6px;width:0%}
</style>
</head>

<body>
<header>📚 Моите испански думи</header>

<div class="container">

<div class="nav">
<button onclick="show('learn')">Учи</button>
<button onclick="show('flash')">Flashcards</button>
<button onclick="show('test')">Тест</button>
<button onclick="show('game')">Игра</button>
<button onclick="show('dictionary')">Речник</button>
<button onclick="show('add')">Добави дума</button>
<button onclick="show('stats')">Статистика</button>
</div>

<div id="learn" class="card">
<h3>Дневен урок</h3>
<div id="todayPlan"></div>
<div class="progress"><div id="progressBar" class="progressbar"></div></div>
<div class="word" id="learnWord"></div>
<div id="learnMeta" class="small"></div>
<div class="translation hidden" id="learnTranslation"></div>
<button onclick="showTranslation()">Покажи</button>
<button class="green" onclick="markKnown()">Знам</button>
<button onclick="nextLearn()">Следваща</button>
<button onclick="speak(currentWord.es)">🔊</button>
</div>

<div id="flash" class="card hidden">
<h3>Flashcards</h3>
<div class="word" id="flashWord"></div>
<div id="flashMeta" class="small"></div>
<div class="translation hidden" id="flashTranslation"></div>
<button onclick="toggleFlash()">Покажи</button>
<button onclick="prevFlash()">⬅️ Предишна</button>
<button onclick="nextFlash()">➡️ Следваща</button>
<button class="green" onclick="markKnownFlash()">Знам</button>
<button onclick="speak(flashCurrent.es)">🔊</button>
</div>

<div id="test" class="card hidden">
<h3>Тест</h3>
<div class="word" id="testWord"></div>
<input id="testInput" placeholder="Напиши превода">
<button onclick="checkTest()">Провери</button>
<button onclick="nextTest()">Следваща</button>
<div id="testResult"></div>
</div>

<div id="game" class="card hidden">
<h3>Игра</h3>
<div class="word" id="gameWord"></div>
<div id="gameOptions"></div>
<div id="gameResult"></div>
</div>

<div id="dictionary" class="card hidden">
<h3>Речник</h3>
<input id="search" placeholder="Търси" oninput="renderDictionary()">
<div id="dictList"></div>
</div>

<div id="add" class="card hidden">
<h3>Добави дума</h3>
<input id="newEs" placeholder="Испански">
<input id="newBg" placeholder="Български">
<button onclick="autoFill()">Авто попълване</button>
<button onclick="addWord()">Добави</button>
<button onclick="voiceAdd()">🎤</button>
</div>

<div id="stats" class="card hidden">
<h3>Статистика</h3>
<div id="statsBox"></div>
</div>

</div>

<script>

let words=[]
let currentIndex=0
let flashIndex=0
let testIndex=0
let learnedToday=0
let reviewToday=0
let lessonSize=10
let currentWord={}
let flashCurrent={}

const sheetURL="PASTE_GOOGLE_SHEET_JSON"

function saveLocal(){localStorage.setItem("spanishWords",JSON.stringify(words))}
function loadLocal(){let d=localStorage.getItem("spanishWords");if(d)words=JSON.parse(d)}

async function loadWords(){
loadLocal()
if(words.length===0){
try{
let r=await fetch(sheetURL)
words=await r.json()
}catch{
words=[
{es:"sociedad",bg:"общество",type:"sustantivo",gender:"f",example:"La sociedad cambia"},
{es:"aunque",bg:"въпреки",type:"conjunción"},
{es:"aprovechar",bg:"възползвам се",type:"verbo",example:"Aprovechar la oportunidad"}
]
}
}
updateStats()
renderDictionary()
startLearn()
}

function show(id){
["learn","flash","test","game","dictionary","add","stats"].forEach(s=>{
document.getElementById(s).classList.add("hidden")
})
document.getElementById(id).classList.remove("hidden")
}

function startLearn(){
updatePlan()
nextLearn()
}

function updatePlan(){
document.getElementById("todayPlan").innerText="Днес: " + lessonSize + " нови думи"
}

function nextLearn(){
currentIndex=(currentIndex+1)%words.length
currentWord=words[currentIndex]
document.getElementById("learnWord").innerText=currentWord.es
let meta=""
if(currentWord.type)meta+=currentWord.type+" "
if(currentWord.gender)meta+=currentWord.gender
if(currentWord.example)meta+=" • " + currentWord.example
document.getElementById("learnMeta").innerText=meta
let tr=document.getElementById("learnTranslation")
tr.innerText=currentWord.bg
tr.classList.add("hidden")
updateProgress()
}

function showTranslation(){document.getElementById("learnTranslation").classList.remove("hidden")}

function markKnown(){words[currentIndex].known=true;learnedToday++;saveLocal();updateStats();nextLearn()}

function updateProgress(){
let percent=(learnedToday/lessonSize)*100
if(percent>100)percent=100
document.getElementById("progressBar").style.width=percent+"%"
}

function toggleFlash(){document.getElementById("flashTranslation").classList.toggle("hidden")}

function nextFlash(){
flashIndex=(flashIndex+1)%words.length
flashCurrent=words[flashIndex]
document.getElementById("flashWord").innerText=flashCurrent.es
let meta=""
if(flashCurrent.type)meta+=flashCurrent.type+" "
if(flashCurrent.gender)meta+=flashCurrent.gender
document.getElementById("flashMeta").innerText=meta

document.getElementById("flashTranslation").innerText=flashCurrent.bg
document.getElementById("flashTranslation").classList.add("hidden")
}

function prevFlash(){flashIndex--;if(flashIndex<0)flashIndex=words.length-1;nextFlash()}

function markKnownFlash(){words[flashIndex].known=true;saveLocal();updateStats();nextFlash()}

function nextTest(){
testIndex=(testIndex+1)%words.length
let w=words[testIndex]
let direction=Math.random()>0.5
if(direction){currentWord={q:w.es,a:w.bg}}
else{currentWord={q:w.bg,a:w.es}}

document.getElementById("testWord").innerText=currentWord.q

document.getElementById("testInput").value=""
document.getElementById("testResult").innerText=""
}

function checkTest(){
let val=document.getElementById("testInput").value.trim().toLowerCase()
if(val===currentWord.a.toLowerCase()){
document.getElementById("testResult").innerText="✔️ Правилно"
}else{
document.getElementById("testResult").innerText="❌ " + currentWord.a
}
}

function startGame(){
let w=words[Math.floor(Math.random()*words.length)]
document.getElementById("gameWord").innerText=w.es
let opts=[w.bg]
while(opts.length<4){
let r=words[Math.floor(Math.random()*words.length)].bg
if(!opts.includes(r))opts.push(r)
}
opts.sort(()=>Math.random()-0.5)
let html=""
opts.forEach(o=>{html+=`<button onclick="answerGame('${o}','${w.bg}')">${o}</button>`})
document.getElementById("gameOptions").innerHTML=html
}

function answerGame(ans,correct){
if(ans===correct){document.getElementById("gameResult").innerText="✔️"}
else{document.getElementById("gameResult").innerText="❌ " + correct}
setTimeout(startGame,1200)
}

function renderDictionary(){
let q=document.getElementById("search").value?.toLowerCase()||""
let list=words.filter(w=>w.es.toLowerCase().includes(q)||w.bg.toLowerCase().includes(q))
let html=""
list.forEach(w=>{
html+=`<div>${w.es} – ${w.bg} <span class='small'>${w.type||""} ${w.gender||""}</span> <button onclick="speak('${w.es}')">🔊</button></div>`
})
document.getElementById("dictList").innerHTML=html
}

function addWord(){
let es=document.getElementById("newEs").value
let bg=document.getElementById("newBg").value
if(!es||!bg)return
words.push({es,bg})
saveLocal()
document.getElementById("newEs").value=""
document.getElementById("newBg").value=""
renderDictionary()
updateStats()
}

async function autoFill(){
let word=document.getElementById("newEs").value
if(!word)return

try{
let r=await fetch("https://api.dictionaryapi.dev/api/v2/entries/es/"+word)
let d=await r.json()
let type=d[0].meanings?.[0]?.partOfSpeech
let example=d[0].meanings?.[0]?.definitions?.[0]?.example

if(type)alert("Част на речта: "+type)
if(example)alert("Пример: "+example)
}catch{}
}

function voiceAdd(){
let rec=new webkitSpeechRecognition()
rec.lang="es-ES"
rec.onresult=e=>{document.getElementById("newEs").value=e.results[0][0].transcript}
rec.start()
}

function speak(word){
let u=new SpeechSynthesisUtterance(word)
u.lang="es-ES"
speechSynthesis.speak(u)
}

function updateStats(){
let total=words.length
let known=words.filter(w=>w.known).length
let learning=total-known

document.getElementById("statsBox").innerHTML=
"Общо думи: "+total+"<br>Научени: "+known+"<br>В процес: "+learning
}

loadWords()
nextFlash()
nextTest()
startGame()

</script>
</body>
</html>
